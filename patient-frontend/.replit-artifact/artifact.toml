kind = "web"
previewPath = "/"
title = "Tabib طبيب"
version = "1.0.0"
id = "artifacts/tabib"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21069

[services.development]
run = "pnpm --filter @workspace/tabib run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tabib", "run", "build" ]
publicDir = "artifacts/tabib/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21069"
BASE_PATH = "/"
